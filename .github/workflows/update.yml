name: Update Dashboard

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 한국시간 자정 (UTC 15:00) 자동 실행
  workflow_dispatch:         # GitHub에서 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl gspread google-auth requests

      - name: Run refresh script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/refresh.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M')"
          git push
